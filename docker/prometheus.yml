global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    monitor: 'atlas-trading'

# ── Alerting (optional: wire up Alertmanager later) ──────────────────────────
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# ── Scrape configs ────────────────────────────────────────────────────────────
scrape_configs:

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Streamlit app metrics
  # Streamlit does not expose a native /metrics endpoint by default.
  # Options:
  #   A) Add a custom /metrics route via prometheus_client in the Streamlit app
  #   B) Use the Python prometheus_client start_http_server() on a sidecar port
  # Placeholder: enable once /metrics endpoint is implemented on port 8501.
  - job_name: 'streamlit'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['atlas-app:8501']
    # Uncomment to suppress errors until the endpoint is live:
    # honor_labels: true

  # PostgreSQL exporter (prometheuscommunity/postgres-exporter)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    labels:
      instance: 'atlas-postgres'

  # Redis exporter (oliver006/redis_exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    labels:
      instance: 'atlas-redis'

  # Node exporter — host-level OS metrics
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    labels:
      instance: 'atlas-host'
