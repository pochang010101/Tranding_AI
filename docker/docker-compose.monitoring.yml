# Monitoring stack — use alongside the main docker-compose.yml
#
# Usage:
#   docker compose -f docker-compose.yml -f docker/docker-compose.monitoring.yml up -d
#
# Required env vars (add to .env or export before running):
#   GRAFANA_ADMIN_PASSWORD  — Grafana admin password
#   POSTGRES_DSN            — postgres-exporter data source name
#                             e.g. postgresql://user:pass@postgres:5432/atlas?sslmode=disable
#   REDIS_ADDR              — redis-exporter target
#                             e.g. redis://redis:6379

services:

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: atlas-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'   # allow POST /-/reload
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - atlas_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: atlas-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - atlas_network
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── PostgreSQL Exporter ─────────────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: atlas-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: ${POSTGRES_DSN}
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "true"
    ports:
      - "9187:9187"
    networks:
      - atlas_network
    depends_on:
      - prometheus

  # ── Redis Exporter ──────────────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: atlas-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: ${REDIS_ADDR:-redis://redis:6379}
    ports:
      - "9121:9121"
    networks:
      - atlas_network
    depends_on:
      - prometheus

  # ── Node Exporter ───────────────────────────────────────────────────────────
  # Note: On Windows hosts running Docker Desktop, node-exporter reports
  # container-level metrics (not bare-metal host metrics).
  # For true host metrics on Windows, consider windows-exporter instead.
  node-exporter:
    image: prom/node-exporter:latest
    container_name: atlas-node-exporter
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
      - '--collector.disable-defaults'
      - '--collector.cpu'
      - '--collector.meminfo'
      - '--collector.diskstats'
      - '--collector.netdev'
      - '--collector.filesystem'
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"
    networks:
      - atlas_network
    pid: host   # requires Linux; omit on Docker Desktop / WSL2 if it errors

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  atlas_network:
    external: true   # must match the network name in docker-compose.yml
