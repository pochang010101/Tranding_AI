##############################################################
# Nginx 反向代理設定 — Atlas Trading System
# 監聽 80 (HTTP)，proxy_pass → Streamlit :8501
# SSL 443 設定區塊已預留，見文件末尾
##############################################################

# ── gzip 壓縮 ────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

# ── upstream ──────────────────────────────────────────────
upstream atlas_app {
    server app:8501;
    keepalive 32;
}

# ── HTTP server ───────────────────────────────────────────
server {
    listen 80;
    server_name _;          # 改為實際 domain，例如 atlas.example.com

    # 安全 headers
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=()" always;
    # Content-Security-Policy: 依需求收緊
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss: ws:;"
        always;

    # 靜態檔案快取
    location /app/static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # WebSocket — Streamlit live-reload / dataframe stream
    location /_stcore/stream {
        proxy_pass         http://atlas_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;   # 長連線不超時
        proxy_send_timeout 86400s;
    }

    # 主應用程式
    location / {
        proxy_pass         http://atlas_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Streamlit 需要 WebSocket upgrade 支援
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;

        # 關閉 buffering，讓 SSE/streaming 即時傳達
        proxy_buffering    off;
    }
}

