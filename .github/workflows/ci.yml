name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check atlas/

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
          cache: pip

      - name: Syntax check all Python files
        run: |
          python -c "
          import ast, os, sys

          errors = []
          for root, dirs, files in os.walk('.'):
              # skip hidden dirs, venv, __pycache__
              dirs[:] = [d for d in dirs if not d.startswith('.') and d not in ('venv', '__pycache__', 'node_modules', '.tox')]
              for fname in files:
                  if not fname.endswith('.py'):
                      continue
                  path = os.path.join(root, fname)
                  try:
                      with open(path, 'r', encoding='utf-8', errors='replace') as f:
                          src = f.read()
                      ast.parse(src, filename=path)
                  except SyntaxError as e:
                      errors.append(f'{path}:{e.lineno}: {e.msg}')

          if errors:
              print('Syntax errors found:')
              for err in errors:
                  print(' ', err)
              sys.exit(1)
          else:
              print(f'All Python files passed syntax check.')
          "

  test:
    runs-on: ubuntu-latest
    needs: [lint, syntax-check]
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: atlas_test
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atlas"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      ATLAS_DB_HOST: localhost
      ATLAS_DB_PORT: 5432
      ATLAS_DB_NAME: atlas_test
      ATLAS_DB_USER: atlas
      ATLAS_DB_PASSWORD: test_password
      ATLAS_REDIS_HOST: localhost
      ATLAS_DATABASE_URL: postgresql://atlas:test_password@localhost:5432/atlas_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: PYTHONPATH=. pytest tests/ -q --tb=short

      - name: Run Alembic migrations
        run: python -m alembic upgrade head

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t atlas-trading:latest .

      - name: Verify image
        run: docker run --rm atlas-trading:latest python -c "import atlas; print('Atlas import OK')"
