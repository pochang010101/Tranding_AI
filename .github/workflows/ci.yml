name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check atlas/
      - run: ruff format --check atlas/

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: atlas_test
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atlas"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      ATLAS_DB_HOST: localhost
      ATLAS_DB_PORT: 5432
      ATLAS_DB_NAME: atlas_test
      ATLAS_DB_USER: atlas
      ATLAS_DB_PASSWORD: test_password
      ATLAS_REDIS_HOST: localhost
      ATLAS_DATABASE_URL: postgresql://atlas:test_password@localhost:5432/atlas_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install ".[dev]"
      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=atlas --cov-report=term-missing
      - name: Run Alembic migrations
        run: python -m alembic upgrade head

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t atlas-trading:latest .
      - name: Verify image
        run: docker run --rm atlas-trading:latest python -c "import atlas; print('Atlas import OK')"
